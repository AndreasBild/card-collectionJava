<script>
       function loadAnalytics() {
         if (window.analyticsLoaded) return;
         if (localStorage.getItem('user_consent') !== 'accepted') {
             // Wait for consent event if not already given
             window.addEventListener('consent-given', loadAnalytics, {once: true});
             return;
         }
         window.analyticsLoaded = true;
         var script = document.createElement('script');
         script.src = "https://www.googletagmanager.com/gtag/js?id=G-535TKYRZTR";
         script.async = true;
         document.head.appendChild(script);

         window.dataLayer = window.dataLayer || [];
         function gtag(){dataLayer.push(arguments);}
         gtag('js', new Date());
         gtag('config', 'G-535TKYRZTR');
       }
       window.addEventListener('scroll', loadAnalytics, {once: true, passive: true});
       window.addEventListener('mousemove', loadAnalytics, {once: true, passive: true});
       window.addEventListener('touchstart', loadAnalytics, {once: true, passive: true});

       // Also try to load if consent was already given in a previous session
       if (localStorage.getItem('user_consent') === 'accepted') {
           loadAnalytics();
       }
</script>
